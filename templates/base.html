<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Employee Ops Assistant{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --bg: #f7f4ee;
        --panel: #ffffff;
        --ink: #1f2937;
        --muted: #6b7280;
        --accent: #0f766e;
      }
      body {
        background: radial-gradient(circle at top, #fff9f0 0, var(--bg) 45%, #eef6f5 100%);
        color: var(--ink);
      }
      .app-shell {
        min-height: 100vh;
      }
      .nav-link-custom {
        color: var(--muted);
        text-decoration: none;
        font-weight: 600;
      }
      .nav-link-custom:hover {
        color: var(--accent);
      }
      .panel {
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 118, 110, 0.12);
        border-radius: 1.25rem;
        box-shadow: 0 24px 60px rgba(31, 41, 55, 0.08);
      }
      .hero-title {
        letter-spacing: -0.03em;
      }
      .soft-badge {
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent);
        border: 1px solid rgba(15, 118, 110, 0.16);
      }
      .feature-tile {
        border: 1px solid rgba(31, 41, 55, 0.08);
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.75);
      }
    </style>
  </head>
  <body>
    <div class="app-shell container py-4 py-lg-5">
      <nav class="d-flex justify-content-between align-items-center mb-4 mb-lg-5">
        <div>
          <div class="fw-bold fs-4">Employee Ops Assistant</div>
          <div class="small text-muted">Internal search for policies and workflows</div>
        </div>
        <div class="d-flex gap-3">
          <a href="/" class="nav-link-custom">Home</a>
          <a href="/ask" class="nav-link-custom">Ask</a>
          <a href="/admin/documents" class="nav-link-custom">Docs</a>
          <a href="/workflows" class="nav-link-custom">Workflows</a>
          <a href="/admin" class="nav-link-custom">Admin</a>
        </div>
      </nav>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
