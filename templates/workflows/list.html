{% extends "base.html" %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Workflows</h2>
    <a class="btn btn-success" href="/workflows/create">Create Workflow</a>
  </div>
  <ul class="list-group">
    {% for wf in workflows %}
      <li class="list-group-item d-flex justify-content-between align-items-center">
        <div>
          <strong>{{ wf.name }}</strong><br>
          <small>{{ wf.description or '' }}</small>
        </div>
        <div>
          <a class="btn btn-sm btn-primary" href="/workflows/{{ wf.id }}">View</a>
        </div>
      </li>
    {% else %}
      <li class="list-group-item">No workflows yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
