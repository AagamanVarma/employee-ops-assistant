{% extends 'base.html' %}
{% block title %}Ask a Question{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card p-4 shadow-sm">
      <h1 class="mb-3">Ask a question</h1>
      <form method="post" action="/ask">
        <div class="mb-3">
          <input id="query-input" name="query" type="text" class="form-control form-control-lg" placeholder="Ask about policies or workflows..." value="{{ query }}" required>
        </div>
        <button class="btn btn-primary btn-lg w-100" type="submit">Ask</button>
      </form>
      <div class="mt-4">
        <p class="mb-2">Try an example:</p>
        <div class="d-flex flex-wrap gap-2">
          {% for example in examples %}
          <button type="button" class="btn btn-outline-secondary btn-sm example-button">{{ example }}</button>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.example-button').forEach(function (button) {
      button.addEventListener('click', function () {
        document.getElementById('query-input').value = button.textContent.trim();
      });
    });
  });
</script>
{% endblock %}
